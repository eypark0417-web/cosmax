<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>니즈오션 | 고객사 PPT</title>
<meta name="description" content="니즈오션에 등록된 전체 고객사의 PPT 제안 양식 준비 현황을 확인하세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#C7AEE3; --rose-soft:#F3EEFB; --rose-deep:#8A6BB0;
    --sky:#A9D6EA; --sky-soft:#EDF7FB; --sky-deep:#5F9BBF;
    --gold:#D6C7ED; --gold-soft:#F6F1FB; --gold-deep:#7C79B8;
    --pink:var(--rose); --pink-soft:var(--rose-soft);
    --yellow:var(--gold); --yellow-soft:var(--gold-soft);
    --ink:#2B2B3D; --ink-soft:#6B6B80; --white:#FFFFFF; --cream:#FCFBFF;
    --shadow: 0 10px 30px rgba(43,43,61,0.06);
    --radius-lg: 32px; --radius-md: 20px; --radius-sm: 14px;
    --accent: var(--gold-deep); --accent-soft: var(--gold-soft);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Malgun Gothic','Noto Sans KR','Apple SD Gothic Neo',sans-serif;
    color:var(--ink); background:var(--cream); overflow-x:hidden; -webkit-font-smoothing:antialiased;
  }
  .kr{font-family:'Malgun Gothic','Noto Sans KR','Apple SD Gothic Neo',sans-serif; font-weight:700;}
  img,svg{display:block;max-width:100%;}
  a{text-decoration:none;color:inherit;}
  ul{list-style:none;}
  button{font-family:inherit;border:none;background:none;cursor:pointer;}
  .container{max-width:900px;margin:0 auto;padding:0 24px;}

  header{
    position:sticky; top:0; z-index:100;
    background:rgba(255,252,245,0.85); backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(43,43,61,0.06);
  }
  .nav-wrap{display:flex;align-items:center;justify-content:space-between;height:76px;max-width:1180px;margin:0 auto;padding:0 24px;}
  .logo{display:flex;align-items:center;gap:10px;font-family:'Malgun Gothic','Noto Sans KR',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.3px;color:var(--ink);}
  .logo span.brand{background:linear-gradient(90deg,var(--rose-deep),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}
  nav.main-nav ul{display:flex;gap:32px;align-items:center;}
  nav.main-nav a{font-size:15px;font-weight:600;color:var(--ink-soft);position:relative;padding:6px 0;transition:color .2s;}
  nav.main-nav a.active{color:var(--gold-deep);}
  nav.main-nav a:hover{color:var(--ink);}
  .cta-btn{
    background:linear-gradient(135deg,var(--rose-deep),var(--gold-deep));color:var(--white);
    font-weight:600;font-size:14.5px;letter-spacing:0.2px;padding:12px 24px;border-radius:999px;
    box-shadow:0 8px 18px rgba(201,122,147,0.28);transition:transform .2s, box-shadow .2s;white-space:nowrap;
  }
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 22px rgba(201,122,147,0.36);}
  .hamburger{display:none;flex-direction:column;gap:5px;padding:8px;z-index:101;}
  .hamburger span{width:24px;height:3px;border-radius:3px;background:var(--ink);transition:all .3s;}

  .page-hero{
    position:relative;padding:52px 0 36px;overflow:hidden;
    background:radial-gradient(circle at 15% 20%, var(--gold-soft) 0%, transparent 45%),
               radial-gradient(circle at 85% 10%, var(--rose-soft) 0%, transparent 45%),
               var(--cream);
  }
  .breadcrumb{font-size:13px;color:var(--ink-soft);margin-bottom:20px;}
  .breadcrumb a{font-weight:600;color:var(--sky-deep);}
  .breadcrumb a:hover{color:var(--rose-deep);}
  .page-badge{
    display:inline-flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--accent-soft);
    padding:8px 20px;border-radius:999px;font-size:13px;font-weight:600;letter-spacing:0.4px;
    color:var(--accent);box-shadow:var(--shadow);margin-bottom:16px;
  }
  .page-title{font-size:clamp(26px,3.6vw,38px);margin-bottom:12px;}
  .page-desc{
    font-size:14.5px;color:var(--ink-soft);line-height:1.75;max-width:100%;
    display:inline-block;background:var(--white);border-radius:16px;
    padding:16px 24px;box-shadow:var(--shadow);border-left:3px solid #F5E6B0;
  }

  .content-section{padding:8px 0 90px;}

  .ppt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .ppt-card{
    background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow);
    padding:22px;
  }
  .ppt-card-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .avatar{
    width:40px;height:40px;border-radius:50%;background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);
    font-family:'Poppins',sans-serif;font-size:13px;flex-shrink:0;
  }
  .ppt-card h3{font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ppt-card .tag{
    font-size:10px;font-weight:700;color:var(--rose-deep);background:var(--rose-soft);
    padding:2px 8px;border-radius:999px;
  }
  .ppt-status{
    display:flex;align-items:center;gap:8px;
    background:var(--cream);border-radius:12px;padding:12px 14px;margin-bottom:12px;
  }
  .ppt-status svg{width:16px;height:16px;color:var(--accent);flex-shrink:0;}
  .ppt-status span{font-size:12.5px;color:var(--ink-soft);}
  .product-chips{display:flex;gap:6px;flex-wrap:wrap;}
  .product-chips span{
    font-size:11px;font-weight:600;color:var(--ink);background:var(--gold-soft);
    padding:4px 10px;border-radius:999px;
  }

  .report-block{
    background:var(--gold-soft);border:1px dashed var(--gold);border-radius:12px;
    padding:12px 14px;margin-top:12px;
  }
  .report-block .report-tag{
    font-size:10px;font-weight:700;color:var(--gold-deep);background:var(--white);
    padding:2px 8px;border-radius:999px;margin-left:6px;
  }
  .report-point{margin:8px 0;}
  .report-point h4{font-size:12.5px;margin-bottom:2px;}
  .report-point p{font-size:11.5px;color:var(--ink-soft);line-height:1.5;}
  .report-file{
    display:inline-block;font-size:11.5px;font-weight:600;color:var(--gold-deep);
    background:var(--white);border:1px solid var(--gold);border-radius:999px;
    padding:4px 10px;margin:6px 0 2px;
  }
  .report-meta{font-size:10.5px;color:var(--ink-soft);}
  .report-meta .delete-link{color:var(--rose-deep);font-weight:700;margin-left:6px;cursor:pointer;}
  .report-meta .delete-link:hover{text-decoration:underline;}
  .new-report-badge{
    font-size:10px;font-weight:700;color:var(--gold-deep);background:var(--gold-soft);
    padding:2px 8px;border-radius:999px;
  }

  .cta-line{
    text-align:center;margin-top:32px;padding:34px;border-radius:var(--radius-lg);
    background:linear-gradient(120deg,var(--rose),var(--sky),var(--gold));
    background-size:220% 220%;color:var(--white);
    box-shadow:0 20px 50px rgba(201,122,147,0.24);
  }
  .cta-line p{font-size:15px;margin-bottom:18px;}
  .cta-line a{
    background:var(--white);color:var(--rose-deep);padding:13px 30px;border-radius:999px;
    font-weight:800;font-size:14.5px;display:inline-block;box-shadow:0 10px 22px rgba(0,0,0,0.12);
    transition:transform .2s;
  }
  .cta-line a:hover{transform:translateY(-2px);}

  footer{background:var(--ink);color:#C9C9DA;padding:40px 0 26px;}
  .footer-inner{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
    font-size:12.5px;color:#9B9BB0;max-width:1180px;margin:0 auto;padding:0 24px;
  }
  .footer-inner .logo{color:var(--white);}

  @media (max-width:760px){
    .hamburger{display:flex;}
    nav.main-nav{
      position:fixed;top:76px;left:0;right:0;background:var(--white);
      padding:20px 24px 28px;box-shadow:0 12px 24px rgba(43,43,61,0.1);
      transform:translateY(-110%);opacity:0;transition:transform .3s ease, opacity .3s ease;z-index:99;
    }
    nav.main-nav.open{transform:translateY(0);opacity:1;}
    nav.main-nav ul{flex-direction:column;align-items:flex-start;gap:16px;}
    .ppt-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <a href="index.html" class="logo"><span>니즈<span class="brand">오션</span></span></a>
    <nav class="main-nav" id="mainNav">
      <ul>
        <li><a href="needs.html">고객사 NEEDS</a></li>
        <li><a href="direction.html">사업방향</a></li>
        <li><a href="ppt.html" class="active">고객사 PPT</a></li>
        <li><a href="update.html">고객사 업데이트</a></li>
        <li><a href="index.html#audience">이용대상</a></li>
      </ul>
    </nav>
    <a href="login.html" class="cta-btn" id="headerCta">무료로 시작하기</a>
    <button class="hamburger" id="hamburger" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">홈</a> / 고객사 PPT</div>
    <span class="page-badge"><span style="color:var(--rose-deep)">◆</span> 전체 고객사 제안서 양식</span>
    <h1 class="page-title kr">고객사 PPT</h1>
    <p class="page-desc">고객사별 제안서 양식은 현재 준비 중입니다. 로그인 후 업데이트 알림을 받아보실 수 있어요.</p>
  </div>
</section>

<section class="content-section">
  <div class="container">
    <div class="ppt-grid" id="pptGrid"></div>
    <div class="cta-line">
      <p class="kr">고객사별 제안서 양식, 가장 먼저 알려드릴게요</p>
      <a href="login.html">회사 계정으로 로그인하기</a>
    </div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <a href="index.html" class="logo"><span>니즈오션</span></a>
    <span>© 2026 NeedsOcean. All rights reserved.</span>
  </div>
</footer>

<script src="data/session.js"></script>
<script src="data/clients.js"></script>
<script src="data/updates.js"></script>
<script>
  NeedsOceanSession.renderHeaderCta();

  const hamburger = document.getElementById('hamburger');
  const mainNav = document.getElementById('mainNav');
  hamburger.addEventListener('click', () => mainNav.classList.toggle('open'));

  const pptGridEl = document.getElementById('pptGrid');
  const esc = NeedsOceanUpdates.escapeHtml;
  function initials(name) { return esc(String(name).slice(0, 2)); }

  const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
  const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 9.5 17 19 6.5"/></svg>';

  function reportBlockHtml(u) {
    const points = NeedsOceanUpdates.toPoints(u.summary, u.content);
    return `
      <div class="report-block">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
          <b style="font-size:12px;">${esc(u.dept)} ${esc(u.empName)} 제보</b>
          <span class="report-tag">실무자 제보</span>
        </div>
        ${points.map(p => `
          <div class="report-point">
            <h4 class="kr">${esc(p.title)}</h4>
            <p>${esc(p.desc)}</p>
          </div>
        `).join('')}
        ${NeedsOceanUpdates.fileChipHtml(u.file)}
        <span class="report-meta">${NeedsOceanUpdates.formatDate(u.createdAt)} 제보 · AI 자동 요약 <span class="delete-link" onclick="removeReport('${u.id}')">삭제</span></span>
      </div>
    `;
  }

  function removeReport(id) {
    if (!confirm('이 제보를 삭제할까요?')) return;
    NeedsOceanUpdates.deleteUpdate(id);
    location.reload();
  }

  if (!NeedsOceanSession.isLoggedIn()) {
    pptGridEl.style.display = 'block';
    pptGridEl.innerHTML = NeedsOceanSession.gateHtml('로그인 후 고객사 PPT 데이터를 확인할 수 있어요.');
    const ctaLineEl = document.querySelector('.cta-line');
    if (ctaLineEl) ctaLineEl.style.display = 'none';
  } else {

  const pptUpdates = NeedsOceanUpdates.getUpdates().filter(u => u.category === 'ppt');
  const updatesByClientId = {};
  const newClientBuckets = [];

  pptUpdates.forEach(u => {
    if (u.matchedId) {
      (updatesByClientId[u.matchedId] = updatesByClientId[u.matchedId] || []).push(u);
      return;
    }
    const key = u.clientName.trim().toLowerCase();
    let bucket = newClientBuckets.find(b => b.key === key);
    if (!bucket) { bucket = { key, clientName: u.clientName.trim(), items: [] }; newClientBuckets.push(bucket); }
    bucket.items.push(u);
  });

  const cardsHtml = window.CLIENT_DATA.map(c => {
    const reports = updatesByClientId[c.id] || [];
    const statusHtml = reports.length
      ? `<div class="ppt-status">${checkIcon}<span>실무자 제보 ${reports.length}건 접수</span></div>`
      : `<div class="ppt-status">${clockIcon}<span>제안서 양식 준비 중입니다</span></div>`;
    return `
      <div class="ppt-card" id="client-${c.id}">
        <div class="ppt-card-head">
          <div class="avatar">${initials(c.name)}</div>
          <h3 class="kr">${esc(c.name)} <span class="tag">${esc(c.tag)}</span></h3>
        </div>
        ${statusHtml}
        <div class="product-chips">${c.products.map(p => `<span>${esc(p)}</span>`).join('')}</div>
        ${reports.map(reportBlockHtml).join('')}
      </div>
    `;
  }).join('');

  const newCardsHtml = newClientBuckets.map(bucket => {
    const elId = 'custom-' + NeedsOceanUpdates.slugify(bucket.clientName);
    return `
      <div class="ppt-card" id="client-${elId}">
        <div class="ppt-card-head">
          <div class="avatar">${initials(bucket.clientName)}</div>
          <h3 class="kr">${esc(bucket.clientName)} <span class="new-report-badge">실무자 제보</span></h3>
        </div>
        <div class="ppt-status">${checkIcon}<span>실무자 제보 ${bucket.items.length}건 접수</span></div>
        ${bucket.items.map(reportBlockHtml).join('')}
      </div>
    `;
  }).join('');

  pptGridEl.innerHTML = cardsHtml + newCardsHtml;

  if (window.location.hash) {
    const target = document.querySelector(window.location.hash);
    if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }

  }
</script>

</body>
</html>
