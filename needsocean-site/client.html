<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>니즈오션 | 고객사 검색결과</title>
<meta name="description" content="니즈오션에서 검색한 고객사의 사업방향, NEEDS, PPT 정보를 확인하세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#C7AEE3;
    --rose-soft:#F3EEFB;
    --rose-deep:#8A6BB0;
    --sky:#A9D6EA;
    --sky-soft:#EDF7FB;
    --sky-deep:#5F9BBF;
    --gold:#D6C7ED;
    --gold-soft:#F6F1FB;
    --gold-deep:#7C79B8;
    --pink:var(--rose);
    --pink-soft:var(--rose-soft);
    --yellow:var(--gold);
    --yellow-soft:var(--gold-soft);
    --ink:#2B2B3D;
    --ink-soft:#6B6B80;
    --white:#FFFFFF;
    --cream:#FCFBFF;
    --shadow: 0 10px 30px rgba(43,43,61,0.06);
    --radius-lg: 32px;
    --radius-md: 20px;
    --radius-sm: 14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Malgun Gothic','Noto Sans KR','Apple SD Gothic Neo',sans-serif;
    color:var(--ink);
    background:var(--cream);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .kr{font-family:'Malgun Gothic','Noto Sans KR','Apple SD Gothic Neo',sans-serif; font-weight:700;}
  img,svg{display:block;max-width:100%;}
  a{text-decoration:none;color:inherit;}
  ul{list-style:none;}
  button{font-family:inherit;border:none;background:none;cursor:pointer;}
  .container{max-width:1180px;margin:0 auto;padding:0 24px;}

  /* ===== Header (동일 컨셉) ===== */
  header{
    position:sticky; top:0; z-index:100;
    background:rgba(255,252,245,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(43,43,61,0.06);
  }
  .nav-wrap{display:flex;align-items:center;justify-content:space-between;height:76px;}
  .logo{
    display:flex;align-items:center;gap:10px;
    font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
    font-size:22px;font-weight:700;letter-spacing:0.3px;color:var(--ink);
  }
  .logo span.brand{
    background:linear-gradient(90deg,var(--rose-deep),var(--gold-deep));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  nav.main-nav ul{display:flex;gap:36px;align-items:center;}
  nav.main-nav a{font-size:15px;font-weight:600;color:var(--ink-soft);position:relative;padding:6px 0;transition:color .2s;}
  nav.main-nav a:hover{color:var(--ink);}
  .cta-btn{
    background:linear-gradient(135deg,var(--rose-deep),var(--gold-deep));
    color:var(--white);font-weight:600;font-size:14.5px;letter-spacing:0.2px;
    padding:12px 24px;border-radius:999px;
    box-shadow:0 8px 18px rgba(201,122,147,0.28);
    transition:transform .2s, box-shadow .2s; white-space:nowrap;
  }
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 22px rgba(201,122,147,0.36);}
  .hamburger{display:none;flex-direction:column;gap:5px;padding:8px;z-index:101;}
  .hamburger span{width:24px;height:3px;border-radius:3px;background:var(--ink);transition:all .3s;}
  .hamburger.active span:nth-child(1){transform:translateY(8px) rotate(45deg);}
  .hamburger.active span:nth-child(2){opacity:0;}
  .hamburger.active span:nth-child(3){transform:translateY(-8px) rotate(-45deg);}

  /* ===== Page hero ===== */
  .page-hero{
    position:relative;
    padding:56px 0 40px;
    overflow:hidden;
    background:radial-gradient(circle at 15% 20%, var(--pink-soft) 0%, transparent 45%),
               radial-gradient(circle at 85% 10%, var(--sky-soft) 0%, transparent 45%),
               radial-gradient(circle at 60% 90%, var(--yellow-soft) 0%, transparent 50%),
               var(--cream);
  }
  .breadcrumb{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:22px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .breadcrumb a{font-weight:600;color:var(--sky-deep);}
  .breadcrumb a:hover{color:var(--rose-deep);}

  .client-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--white);border:1px solid var(--rose-soft);
    padding:8px 20px;border-radius:999px;font-size:13px;font-weight:600;
    letter-spacing:0.4px;color:var(--rose-deep);box-shadow:var(--shadow);
    margin-bottom:18px;
  }
  .client-name{
    font-size:clamp(28px,4vw,42px);
    line-height:1.3;
    margin-bottom:14px;
  }
  .client-tag{
    display:inline-block;
    font-size:12.5px;
    font-weight:700;
    color:var(--sky-deep);
    background:var(--sky-soft);
    padding:5px 14px;
    border-radius:999px;
    margin-bottom:8px;
  }
  .client-disclaimer{
    font-size:13px;
    color:var(--ink-soft);
    max-width:640px;
    line-height:1.7;
    margin-top:10px;
  }

  /* ===== Summary card (간략 요약) ===== */
  .content-section{padding:10px 0 80px;background:var(--white);}
  .summary-card{
    background:var(--white);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:6px;
    margin-bottom:28px;
    overflow:hidden;
  }
  .summary-row{
    display:flex;
    gap:16px;
    align-items:flex-start;
    padding:22px 22px;
    border-bottom:1px solid rgba(43,43,61,0.06);
  }
  .summary-row:last-child{border-bottom:none;}
  .summary-row .row-icon{
    width:42px;height:42px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .summary-row .row-icon.sky{background:var(--sky-soft);}
  .summary-row .row-icon.rose{background:var(--rose-soft);}
  .summary-row .row-icon.gold{background:var(--gold-soft);}
  .summary-row .row-icon svg{width:19px;height:19px;}
  .summary-row .row-txt{flex:1;min-width:0;}
  .summary-row .row-txt .row-label{
    font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:5px;
  }
  .summary-row .row-txt p{font-size:14.5px;line-height:1.6;color:var(--ink);}
  .summary-row .row-more{
    font-size:12.5px;font-weight:700;color:var(--sky-deep);white-space:nowrap;
    flex-shrink:0;align-self:center;transition:color .2s;
  }
  .summary-row .row-more:hover{color:var(--rose-deep);}
  .product-chips{display:flex;gap:8px;flex-wrap:wrap;}
  .product-chips span{
    font-size:12px;font-weight:600;color:var(--ink);background:var(--gold-soft);
    padding:5px 12px;border-radius:999px;
  }
  @media (max-width:600px){
    .summary-row{flex-wrap:wrap;}
    .summary-row .row-more{margin-left:58px;}
  }

  .cta-line{
    text-align:center;
    padding:34px;
    border-radius:var(--radius-lg);
    background:linear-gradient(120deg,var(--rose),var(--sky),var(--gold));
    background-size:220% 220%;
    color:var(--white);
    box-shadow:0 20px 50px rgba(201,122,147,0.24);
  }
  .cta-line p{font-size:15px;margin-bottom:18px;}
  .cta-line a{
    background:var(--white);color:var(--rose-deep);
    padding:13px 30px;border-radius:999px;font-weight:800;font-size:14.5px;
    display:inline-block;box-shadow:0 10px 22px rgba(0,0,0,0.12);
    transition:transform .2s;
  }
  .cta-line a:hover{transform:translateY(-2px);}

  /* ===== Empty state ===== */
  .empty-state{
    text-align:center;
    padding:60px 24px 80px;
  }
  .empty-icon{
    width:80px;height:80px;border-radius:50%;
    background:var(--rose-soft);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 22px;
  }
  .empty-icon svg{width:34px;height:34px;}
  .empty-state h2{font-size:22px;margin-bottom:10px;}
  .empty-state p{font-size:14.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:26px;}
  .empty-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn-outline{
    padding:13px 26px;border-radius:999px;font-weight:700;font-size:14.5px;
    border:2px solid var(--ink);color:var(--ink);transition:all .2s;
  }
  .btn-outline:hover{background:var(--ink);color:var(--white);}
  .btn-primary{
    padding:13px 26px;border-radius:999px;font-weight:700;font-size:14.5px;
    background:linear-gradient(135deg,var(--rose-deep),var(--gold-deep));
    color:var(--white);box-shadow:0 10px 24px rgba(201,122,147,0.28);
    transition:transform .2s;
  }
  .btn-primary:hover{transform:translateY(-2px);}

  /* ===== Footer (동일 컨셉, 간략) ===== */
  footer{background:var(--ink);color:#C9C9DA;padding:40px 0 26px;}
  .footer-inner{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
    font-size:12.5px;color:#9B9BB0;
  }
  .footer-inner .logo{color:var(--white);}

  @media (max-width:760px){
    .hamburger{display:flex;}
    nav.main-nav{
      position:fixed; top:76px; left:0; right:0;
      background:var(--white);
      padding:20px 24px 28px;
      box-shadow:0 12px 24px rgba(43,43,61,0.1);
      transform:translateY(-110%); opacity:0;
      transition:transform .3s ease, opacity .3s ease;
      z-index:99;
    }
    nav.main-nav.open{transform:translateY(0);opacity:1;}
    nav.main-nav ul{flex-direction:column;align-items:flex-start;gap:16px;}
  }
  @media (max-width:480px){
    .container{padding:0 18px;}
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header>
  <div class="container nav-wrap">
    <a href="index.html" class="logo">
      <span>니즈<span class="brand">오션</span></span>
    </a>
    <nav class="main-nav" id="mainNav">
      <ul>
        <li><a href="needs.html">고객사 NEEDS</a></li>
        <li><a href="direction.html">사업방향</a></li>
        <li><a href="ppt.html">고객사 PPT</a></li>
        <li><a href="update.html">고객사 업데이트</a></li>
        <li><a href="index.html#audience">이용대상</a></li>
      </ul>
    </nav>
    <a href="login.html" class="cta-btn" id="headerCta">무료로 시작하기</a>
    <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ===== Page hero ===== -->
<section class="page-hero">
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">홈</a> / 고객사 검색결과
    </div>
    <div id="clientHeroContent"></div>
  </div>
</section>

<!-- ===== Content ===== -->
<section class="content-section">
  <div class="container" id="clientBodyContent"></div>
</section>

<!-- ===== Footer ===== -->
<footer>
  <div class="container footer-inner">
    <a href="index.html" class="logo"><span>니즈오션</span></a>
    <span>© 2026 NeedsOcean. All rights reserved.</span>
  </div>
</footer>

<script src="data/session.js"></script>
<script src="data/clients.js"></script>
<script src="data/updates.js"></script>
<script>
  NeedsOceanSession.renderHeaderCta();

  const hamburger = document.getElementById('hamburger');
  const mainNav = document.getElementById('mainNav');
  hamburger.addEventListener('click', () => mainNav.classList.toggle('open'));

  const esc = NeedsOceanUpdates.escapeHtml;
  const params = new URLSearchParams(window.location.search);
  const query = (params.get('name') || '').trim();
  const heroEl = document.getElementById('clientHeroContent');
  const bodyEl = document.getElementById('clientBodyContent');

  if (!NeedsOceanSession.isLoggedIn()) {
    heroEl.innerHTML = '';
    bodyEl.innerHTML = NeedsOceanSession.gateHtml('로그인 후 고객사 검색 결과를 확인할 수 있어요.');
  } else {

  const compassIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#5F9BBF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14.8 9.2 12.9 14.8 9.2 14.8 11.1 9.2Z"/></svg>';
  const heartIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#8A6BB0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.5s-7.5-4.6-9.5-9.2C1.2 8.2 3 5 6.3 5c2 0 3.4 1.2 4.2 2.4C11.3 6.2 12.7 5 14.7 5 18 5 19.8 8.2 18.5 11.3 16.5 15.9 12 20.5 12 20.5Z"/></svg>';
  const docIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#7C79B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="12" rx="1.6"/><path d="M9 20.5h6M12 16.5v4"/></svg>';
  const searchIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#8A6BB0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';

  function matchClient(q) {
    const norm = q.toLowerCase();
    return window.CLIENT_DATA.find(c =>
      c.name.toLowerCase() === norm || c.englishName.toLowerCase() === norm || c.id.toLowerCase() === norm
    ) || window.CLIENT_DATA.find(c =>
      c.name.toLowerCase().includes(norm) || c.englishName.toLowerCase().includes(norm)
    );
  }

  const matched = query ? matchClient(query) : null;

  // 공식 데이터에 없어도, 실무자가 제보한 고객사라면 검색에 노출
  let reportedClient = null;
  if (!matched && query) {
    const reports = NeedsOceanUpdates.getUpdates().filter(u =>
      !u.matchedId && u.clientName.trim().toLowerCase() === query.toLowerCase()
    );
    if (reports.length) {
      const byCategory = {};
      reports.forEach(r => { (byCategory[r.category] = byCategory[r.category] || []).push(r); });
      reportedClient = {
        id: 'custom-' + NeedsOceanUpdates.slugify(query),
        name: reports[0].clientName,
        byCategory
      };
    }
  }

  if (matched) {
    heroEl.innerHTML = `
      <span class="client-badge"><span style="color:var(--gold-deep)">◆</span> 고객사 프로필 · 예시 데이터</span>
      <h1 class="client-name kr">${matched.name} <span style="color:var(--ink-soft);font-weight:500;font-size:0.55em;">(${matched.englishName})</span></h1>
      <span class="client-tag">${matched.tag}</span>
      <p class="client-disclaimer">아래 요약은 니즈오션 검색 기능을 보여주기 위해 작성된 가상의 예시 데이터입니다.</p>
    `;

    bodyEl.innerHTML = `
      <div class="summary-card">
        <div class="summary-row">
          <div class="row-icon sky">${compassIcon}</div>
          <div class="row-txt"><div class="row-label">사업방향</div><p>${matched.direction.summary}</p></div>
          <a class="row-more" href="direction.html#client-${matched.id}">자세히 →</a>
        </div>
        <div class="summary-row">
          <div class="row-icon rose">${heartIcon}</div>
          <div class="row-txt"><div class="row-label">주요 니즈</div><p>${matched.needs.summary}</p></div>
          <a class="row-more" href="needs.html#client-${matched.id}">자세히 →</a>
        </div>
        <div class="summary-row">
          <div class="row-icon gold">${docIcon}</div>
          <div class="row-txt"><div class="row-label">주요 브랜딩 제품</div><div class="product-chips">${matched.products.map(p => `<span>${p}</span>`).join('')}</div></div>
          <a class="row-more" href="ppt.html#client-${matched.id}">PPT →</a>
        </div>
      </div>

      <div class="cta-line">
        <p class="kr">${matched.name}의 전체 데이터가 궁금하신가요?</p>
        <a href="login.html">회사 계정으로 로그인하기</a>
      </div>
    `;
  } else if (reportedClient) {
    const { name, id, byCategory } = reportedClient;

    function rowOrEmpty(cat, icon, iconClass, label, page) {
      const reports = byCategory[cat];
      if (reports && reports.length) {
        const titles = reports.flatMap(r => NeedsOceanUpdates.toPoints(r.summary, r.content).map(p => p.title)).slice(0, 3);
        const summaryText = titles.length ? titles.map(esc).join(' · ') : esc(reports[0].content).slice(0, 60);
        return `
          <div class="summary-row">
            <div class="row-icon ${iconClass}">${icon}</div>
            <div class="row-txt"><div class="row-label">${label}</div><p>${summaryText}</p></div>
            <a class="row-more" href="${page}#client-${id}">자세히 →</a>
          </div>
        `;
      }
      return `
        <div class="summary-row">
          <div class="row-icon ${iconClass}" style="opacity:0.4;">${icon}</div>
          <div class="row-txt"><div class="row-label">${label}</div><p style="color:var(--ink-soft);">아직 제보된 내용이 없어요</p></div>
          <a class="row-more" href="update.html">제보하기 →</a>
        </div>
      `;
    }

    heroEl.innerHTML = `
      <span class="client-badge"><span style="color:var(--gold-deep)">◆</span> 실무자 제보 · 검증 전 데이터</span>
      <h1 class="client-name kr">${esc(name)}</h1>
      <span class="client-tag">실무자 제보</span>
      <p class="client-disclaimer">아직 공식 등록되지 않은 고객사로, 실무자가 제보한 내용을 AI가 요약한 결과입니다.</p>
    `;

    bodyEl.innerHTML = `
      <div class="summary-card">
        ${rowOrEmpty('direction', compassIcon, 'sky', '사업방향', 'direction.html')}
        ${rowOrEmpty('needs', heartIcon, 'rose', '주요 니즈', 'needs.html')}
        ${rowOrEmpty('ppt', docIcon, 'gold', '고객사 PPT', 'ppt.html')}
      </div>

      <div class="cta-line">
        <p class="kr">${esc(name)}에 대해 더 알고 있나요?</p>
        <a href="update.html">고객사 업데이트 작성하기</a>
      </div>
    `;
  } else {
    const suggestions = window.CLIENT_DATA.slice(0, 3);
    heroEl.innerHTML = `
      <span class="client-badge"><span style="color:var(--gold-deep)">◆</span> 고객사 검색결과</span>
      <h1 class="client-name kr">'${esc(query) || '검색어 없음'}'</h1>
    `;
    bodyEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${searchIcon}</div>
        <h2 class="kr">아직 준비된 데이터가 없어요</h2>
        <p>'${esc(query)}'에 대한 정보는 아직 준비 중입니다.<br>아래 고객사를 예시로 검색하거나, 직접 제보해보세요.</p>
        <div class="empty-actions">
          ${suggestions.map(c => `<a href="client.html?name=${encodeURIComponent(c.name)}" class="btn-primary">${c.name}</a>`).join('')}
          <a href="update.html" class="btn-outline">고객사 업데이트 작성하기</a>
        </div>
      </div>
    `;
  }

  // 위에서 동적으로 그린 CTA 배너도 로그인 상태면 서비스로 연결되도록 갱신
  NeedsOceanSession.rewriteStartCtas(bodyEl);

  }
</script>

</body>
</html>
